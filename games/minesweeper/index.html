<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>

    <link rel = "stylesheet" href="style.css">
</head>

<body>
    <canvas id="bg"></canvas>
    <button class="back-btn" onclick="goBack()">← Back</button>
    
    <h1> Minesweeper</h1>
    
    <div class="hud">

        <div class="panel">
            MINES: <span id="mine-count">20</span>
        </div>

        <div class="panel">
            STATUS: <span id="status">ACTIVE</span>
        </div>

    <p id="status"></p>

    <table id = "grid"></table>

    <button class="reset-btn" onclick="generateGrid()">RESET</button>

    <script src="index.js"></script>
    <script src="bg.js"></script>

    <link rel="stylesheet" href="../../css/hub-utils.css">
    <script src="../../js/bg-music.js"></script>
